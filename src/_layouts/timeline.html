---
layout: default
---

<!-- Parallel Mode -->
<script src="{{ site.url }}{{ site.baseurl }}/src/assets/js/timeline-list.js"></script>
<!-- 指定正文容器 -->
<script> 
document.addEventListener('DOMContentLoaded', function () {
  window.parallelTextColumns.init({
    selectors: ['.content'], // 选择应用的【直接！】容器
    autoEnable: true, // 自动开启
    includeHeadings: false, // 不翻译标题
    fontSize: '14px', // 统一字体大小
    compactText: true, // 去除边框和距离
    columnGap: '0.9rem', //
    dividerInset: '0.2rem', //
    dividerThickness: '1px', // 分割线的宽度
    verticalAlign: 'center', // 各列上下居中，'start'是开头
    blockSpacing: '1.5rem' // 块间的距离
  });
});
</script>

<h1 id="{{page.title}}">{{ page.title }}</h1>
{% include post_info.html %}
<br />
<div class="js-timeline"> <!-- 这里不是content -->
{{ content }}
</div>

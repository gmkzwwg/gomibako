---
layout: default
toc: false
title_selector: h1
---

<!-- Content -->
<div class="content">
  {{ content }}
</div>
<script src="{{ site.url }}{{ site.baseurl }}/src/assets/js/slide.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    window.JekyllSlides.init({
      rootSelector: ".content",   // 选中 class="content" 的正文容器
      titleSelector: "{{page.title_selector}}",        // 每个 h1 作为一页的起点

      startIndex: 0,              // 初始显示第 1 页，0 表示第一页
      loop: true,                 // 切到最后一页后，再下一页会回到第一页
      keyboard: true,             // 开启键盘翻页
      showControls: true,         // 显示右下角前后按钮

      prevButtonText: "◀",        // 上一页按钮文字
      nextButtonText: "▶",        // 下一页按钮文字

      prevKeys: ["ArrowLeft", "PageUp", "Backspace"], // 上一页按键
      nextKeys: ["ArrowRight", "PageDown", " ", "Enter"], // 下一页按键

    });
  });
</script>

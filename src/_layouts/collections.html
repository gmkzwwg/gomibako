---
layout: default
---

<div class="collection_list">
<h1>Collections</h1>
{% for collection in site.collections %}
    <h2>{{collection.label}}</h2>
    {% for post in collection.docs %}
        <p>
            &nbsp;&nbsp;
            <a class="a_title" href="{{ post.url | relative_url }}">{{post.title}}</a>  
        </p>
    {% endfor %}
{% endfor %}
</div>

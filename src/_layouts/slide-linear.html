---
layout: default
---

<div class="post-content">
{{ content }}
</div>

<script src="{{ '/src/assets/js/jekyll-slide-linear.js' | relative_url }}"></script>
<script>
  updateLinearConfig({
    targetSelectors: ['.post-content'],
    mode: 'linear',
    headingPadding: { top: 30, right: 30, bottom: 30, left: 30 },
    bodyPadding: { top: 0, right: 24, bottom: 0, left: 24 },
    mobileBreakpoint: 600,
    animationMs: 460,
    controls: {
      menu: { show: true, label: '≣' },
      first: { show: true, label: '«' },
      prev: { show: true, label: '‹' },
      next: { show: true, label: '›' },
      last: { show: true, label: '»' },
      autoplay: { show: true, label: '▸' }
    },
    indexPage: {
      enabled: true,
      position: 'first',
      menuTitle: 'Table of Contents',
      headingText: " Table of Contents"
    },
    autoplayInterval: 4
  });
</script>

---
layout: default
---

<script src="{{ site.url }}{{ site.baseurl }}/src/assets/js/jekyll-slide-linear.js"></script>
<script>
  updateLinearConfig({
    targetSelectors: ['.post-content'],
    mode: 'linear',
    headingPadding: { top: 48, right: 56, bottom: 42, left: 56 },
    bodyPadding: { top: 0, right: 48, bottom: 0, left: 48 },
    mobileBreakpoint: 600,
    animationMs: 460,
    controls: {
      menu: { show: true, label: '≣' },
      first: { show: true, label: '«' },
      prev: { show: true, label: '‹' },
      next: { show: true, label: '›' },
      last: { show: true, label: '»' },
      autoplay: { show: true, label: '▸' }
    },
    autoplayInterval: 4
  });
</script>
<!-- Content -->

<div class="post-content">
  {{ content }}
</div>

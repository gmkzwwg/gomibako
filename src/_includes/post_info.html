<div class="post_info">
  <!-- Author -->
  {% if page.author %}
  <span>
    <i class="fa fa-user-secret"></i>
    {{ page.author }}&nbsp;
  </span>
  {% endif %}
  <!-- Date -->
  {% if page.show_date %}
  <span>
    <i class="fa fa-calendar"></i>
    {{ page.date | date: "%b %d, %Y" }}&nbsp;
  </span>
  {% endif %}
  <!-- Category -->
  {% if page.category %}
  <span>
    <i class="fa fa-archive"></i>
    {{ page.category }}
  </span>
  {% endif %}
  <!-- Tags 测试条件：未设置：nil 设置，但为空：empty -->
  <!-- {% unless page.tags == "not set" %} 
  <span>
    <i class="fa fa-tag"></i>
    {% for tag in page.tags %} {{ tag }} {% unless forloop.last %} {% endunless
    %} {% endfor %}
  </span>
  {% endunless %} -->
  <!-- Subclass -->
  {% if page.subclass %}
  <span>
    <i class="fa fa-star"></i>
    {{ page.subclass }}
  </span>
  {% endif %}
</div>
<!-- Abstract -->
{% if page.abstract %}
<div class="abstract">
  <p>{{ page.abstract }}</p>
</div>
{% endif %}

# 1. Site Settings
#url                 : "http://127.0.0.1:4000"
# baseurl            : ""
url                : "https://gmkz.top" # A trailing “/” at the end of the field is unnecessary.
permalink           : /:title/
markdown            : kramdown
# Site Texts
title               : 垃圾箱
owner               : 垃圾残渣
description         : "Personal rubbish of gmkzwwg"
statement           : "Designed by gmkzwwg, All Rights Reserved"
posts_btn_text      : Posts
archive_btn_text    : Notes
home_btn_text       : Home
matrix_bg_text             : "01αβγδεζηθικλμνξοπρστυφχψωijxyz#$%&*+" # texts randomly displayed in background
# matrix_bg_text             : "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-"
empty_text: "No posts yet."

# 2. Collections
collection_order    : 
  [
    "phil",    
    "litr",
    "hist",
    "psyc",
    "math",
    "comp",
    "phys",
    "misc",
  ]

collections:
  math:
    output          : true
    permalink       : /:collection/:title/
    alias           : "MATH"
  phil:
    output          : true
    permalink       : /:collection/:title/
    alias           : "PHIL"
  hist:
    output          : true
    permalink       : /:collection/:title/
    sort_by         : name
    alias           : "HIST"
  litr:
    output          : true
    permalink       : /:collection/:title/
    alias           : "LITR"
  comp:
    output          : true
    permalink       : /:collection/:title/
    alias           : "COMP"
  misc:
    output          : true
    permalink       : /:collection/:title/
    alias           : "MISC"
  psyc:
    output          : true
    permalink       : /:collection/:title/
    alias           : "PSYC"
  phys:
    output          : true
    permalink       : /:collection/:title/
    alias           : "PHYS"

# 3. Comment settings（disqus.com）
disqus_username     : gmkzwwg

# 4. Default page configuration
defaults:
  -    
    scope:
      path          : ""  # an empty string here means all files in the project
    values:
      layout              : "post"      # "post"/"parallel"/"compact"/"bilingual"/"print"
      btn_text            : true        # show button text by default
      show_posts          : true
      show_collections    : true        # show archive button by default
      home_btn            : true        # show home by default
      maximize            : true        # show maximize button by default
      encrypted_text      : false       # use encrytion function by default
      toc                 : "chart"     # toc right-up conner: "chart"/"compact"/"list"
      toc_before_content  : false       # toc before content: "chart"/"compact"/"list"
      toc_depth           : 4           # the toc depth by default
      author              :             # author name by default
      show_date           : false       # show date message by default
      category            :             # category by default
    
      comment             : false
      footer              : false       # show footer by default
      context_menu        : true        # Change right-click menu
      text_indent         : false

# 5. Social Media Accounts
email               : "gmkzwwg@outlook.com" 
github              : "gmkzwwg" 

# 6. Where things are
source              : .
destination         : ./_site
collections_dir     : collections
plugins_dir         : src/_plugins  # takes an array of strings and loads plugins in that order
layouts_dir         : src/_layouts
data_dir            : src/_data
includes_dir        : src/_includes
sass:
  sass_dir          : src/_sass

# User defined paths
img                 : /images      # When inserting images, could use "{{site.img}}/path/to/image.png" instead

# 7. Plugins
plugins:            # if "Jekyll::Errors::MissingDependencyException" -> Gem install jekyll-xxx
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-mermaid

# 8. JS version
# Search Plugins on: https://cdnjs.com/
# This is functioned in ./src/_includes/head.html
mathjax_version     : # "3.2.2"
katex_version       : "0.16.9"
mermaid_version     : "11.12.0"
fontawesome_version : "4.6.0"

# 9. kramdown settings
kramdown:
#  parse_block_html: true

# 10. Others
# Cross-Origin Resource Sharing header
webrick:
  headers:
   Access-Control-Allow-Origin: "*"


